  <script>
    (function(){
      try {
        var t = localStorage.getItem('uniway-theme');
        if (!t && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch(e){}
    })();
  </script>
